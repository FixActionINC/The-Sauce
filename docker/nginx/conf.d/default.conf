# Rate limiting zones
# General pages: 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
# API endpoints: 5 requests/second per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

# HTTP server - redirect all traffic to HTTPS except ACME challenges
server {
    listen 80;
    server_name jonesingforsauce.com www.jonesingforsauce.com;

    # Allow certbot ACME challenge for SSL certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name jonesingforsauce.com www.jonesingforsauce.com;

    # SSL certificates (managed by certbot / Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/jonesingforsauce.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jonesingforsauce.com/privkey.pem;

    # SSL configuration - only modern protocols
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Main application - rate limited
    location / {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API routes - stricter rate limiting
    location /api/ {
        limit_req zone=api burst=10 nodelay;

        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Square webhooks - NO rate limiting (Square needs reliable delivery)
    location /api/webhooks/ {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js static assets - long-lived immutable cache
    # NOTE: Nginx does NOT inherit add_header directives from parent blocks
    # when any add_header is used in a child block. All security headers
    # must be explicitly repeated here alongside the cache headers.
    location /_next/static/ {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Security headers (must be repeated - not inherited from server block)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Cache headers
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
