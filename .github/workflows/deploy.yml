# CD Pipeline - Builds Docker image, pushes to ECR, and deploys to EC2 on merge to main
# Platform: GitHub Actions | AWS ECR | SSM Run Command | Docker Compose on EC2
#
# Deployment uses SSM Run Command instead of SSH — no port 22 access required.
# Config files are synced via S3; deploy.sh is executed remotely via SSM.
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID      - CI/CD IAM user access key (ECR push + S3 sync + SSM)
#   AWS_SECRET_ACCESS_KEY  - CI/CD IAM user secret key
#   ECR_REPOSITORY         - Full ECR repository URI (e.g. 123456789.dkr.ecr.us-west-2.amazonaws.com/the-sauce/web)
#   EC2_INSTANCE_ID        - EC2 instance ID for SSM targeting (e.g. i-0436af78e05142202)
name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_DEPLOY_REGION: us-west-2
  S3_DEPLOY_BUCKET: the-sauce-backups-520473892458

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEPLOY_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }} -t ${{ secrets.ECR_REPOSITORY }}:latest .
          docker push ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
          docker push ${{ secrets.ECR_REPOSITORY }}:latest

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - Verify AWS identity and credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-west-2
        run: |
          unset AWS_SESSION_TOKEN
          echo "==> Caller identity:"
          aws sts get-caller-identity
          echo "==> AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION"
          echo "==> Has AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:+YES}"
          echo "==> Testing SSM send-command..."
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --region us-west-2 \
            --parameters 'commands=["echo hello"]' \
            --query "Command.CommandId" \
            --output text

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEPLOY_REGION }}

      - name: Sync config files to S3
        run: |
          aws s3 sync docker/ "s3://${S3_DEPLOY_BUCKET}/deploy-config/docker/" --delete --exact-timestamps
          aws s3 cp docker-compose.yml "s3://${S3_DEPLOY_BUCKET}/deploy-config/docker-compose.yml"

      - name: Deploy via SSM Run Command
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --region "${AWS_DEPLOY_REGION}" \
            --timeout-seconds 300 \
            --comment "Deploy from commit ${{ github.sha }}" \
            --parameters 'commands=[
              "set -e",
              "echo \"==> Syncing config from S3...\"",
              "aws s3 sync s3://'"${S3_DEPLOY_BUCKET}"'/deploy-config/ /opt/the-sauce/ --delete --exact-timestamps",
              "chown -R deploy:deploy /opt/the-sauce",
              "chmod +x /opt/the-sauce/docker/*.sh",
              "echo \"==> Running deploy.sh as deploy user...\"",
              "runuser -u deploy -- bash -c '\''export ECR_REPOSITORY=${{ secrets.ECR_REPOSITORY }} && export AWS_REGION='"${AWS_DEPLOY_REGION}"' && /opt/the-sauce/docker/deploy.sh'\''"
            ]' \
            --cloud-watch-output-config '{"CloudWatchLogGroupName":"/the-sauce/deploy","CloudWatchOutputEnabled":true}' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Poll for completion
          while true; do
            sleep 10

            RESULT=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region "${AWS_DEPLOY_REGION}" \
              --query "[Status, StatusDetails]" \
              --output text 2>&1) || true

            STATUS=$(echo "$RESULT" | awk '{print $1}')
            echo "Status: $STATUS"

            case "$STATUS" in
              Success)
                echo "==> Deployment completed successfully!"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --region "${AWS_DEPLOY_REGION}" \
                  --query "StandardOutputContent" \
                  --output text
                exit 0
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                echo "==> Deployment failed with status: $STATUS"
                echo "=== STDOUT ==="
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --region "${AWS_DEPLOY_REGION}" \
                  --query "StandardOutputContent" \
                  --output text || true
                echo "=== STDERR ==="
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --region "${AWS_DEPLOY_REGION}" \
                  --query "StandardErrorContent" \
                  --output text || true
                exit 1
                ;;
              InProgress|Pending|Delayed)
                ;;
              *)
                echo "Unknown status: $STATUS, continuing to poll..."
                ;;
            esac
          done
